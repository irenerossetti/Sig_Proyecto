name: tracker
description: "GeoGuard Tracker - Rastreo GPS en tiempo real"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  geolocator: ^14.0.2
  shared_preferences: ^2.2.2
  battery_plus: ^7.0.0
  web_socket_channel: ^3.0.1
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.3
  flutter_local_notifications: ^19.5.0
  permission_handler: ^12.0.1
  # New dependencies for offline queue and local geofencing
  sqflite: ^2.3.0
  path: ^1.8.3
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Generador de iconos para Android e iOS
  flutter_launcher_icons: ^0.14.3

# Configuración de flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#4CAF50"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
