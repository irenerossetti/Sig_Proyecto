services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geoguard-backend-prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - USE_GCS=False
    env_file:
      - ./backend/.env.prod
    volumes:
      - backend-media:/app/media
      - backend-static:/app/staticfiles
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: geoguard-redis-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://54.205.90.4
        - NEXT_PUBLIC_WS_URL=ws://54.205.90.4
    container_name: geoguard-web-prod
    restart: always
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: geoguard-nginx-prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - backend-media:/app/media:ro
      - backend-static:/app/static:ro
    depends_on:
      - backend
      - web

volumes:
  backend-media:
  backend-static:
  redis-data:
