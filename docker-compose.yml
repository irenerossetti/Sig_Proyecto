services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geoguard-backend
    ports:
      - "8000:8080"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./backend:/app
      - backend-media:/app/media
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8080"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: geoguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  backend-media:
  redis-data:
